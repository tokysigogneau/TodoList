<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Spring Shop</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css"
          th:href="@{css/bootstrap.min.css}">
    <link rel="stylesheet" href="../static/css/style.css"
          th:href="@{css/style.css}">

</head>

<body>
<div layout:fragment="content">

    <div class="container">


        <div class="panel panel-primary">
            <div class="panel-heading">Task par categories</div>

            <div class="panel-body">
                <ul class="d-flex cat-button">
                    <li>
                        <a class="btn btn-primary" th:href="@{'/my_tasks'(page=0, category=0, keyword=${keyword})}">
                            Toutes categories
                        </a>
                    </li>

                    <li class="btn btn-outline-primary" th:each="a : ${category_list}">
                        <a th:href="@{'/my_tasks'(page=${currentPage}, category=${a.id}, keyword=${keyword})}"
                           th:text="${a.name}"></a>
                    </li>

                </ul>



            </div>

            <div class="panel-body">
                <form th:action="@{/my_tasks}" method="get">
                    <label>
                        Rechercher
                        <input type="text" name="keyword" th:value="${keyword}">
                    </label>
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </div>
            <div class="panel-body">
                <table class="table table-bordered">
                    <tr>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Progression</th>


                    </tr>
                    <tr th:each="a:${listTasks}">
                        <td th:text="${a.id}"></td>
                        <td >
                            <a th:text="${a.name}" th:href="@{/edit_task/{id}(id=${a.id})}">

                            </a>
                        </td>
                        <td th:text="${a.date}"></td>
                        <td th:text="${a.description}"></td>
                        <td th:text="${a.category.name}"></td>
                        <td th:text="${a.progression.name}"></td>


                    </tr>
                </table>

                <ul class="nav nav-pills">
                    <li th:each="page, status : ${pages}"
                        th:class="${currentPage == status.index} ? 'active'">
                        <a th:href="@{/my_tasks(page=${status.index},keyword=${keyword}, category=${category})}"
                           th:text="${status.index + 1}" ></a>
                    </li>
                </ul>


            </div>
        </div>
    </div>
</div>
</body>
</html>
